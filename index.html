<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vendetta</title>
<style>
@font-face{font-family:'Roboto';src:url('fonts/Roboto-Regular.ttf') format('truetype');font-weight:400;font-style:normal}
@font-face{font-family:'Roboto';src:url('fonts/Roboto-Bold.ttf') format('truetype');font-weight:700;font-style:normal}
@font-face{font-family:'Roboto';src:url('fonts/Roboto-Black.ttf') format('truetype');font-weight:900;font-style:normal}

@font-face{font-family:'Roboto';src:url('fonts/Roboto-Medium.ttf') format('truetype');font-weight:500;font-style:normal}
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;font-family:'Roboto',sans-serif;color:#fff}
canvas#pc{display:block;position:fixed;top:0;left:0;width:100%;height:100%;z-index:0}
canvas#particles{display:block;position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}

.panel{

.title{

.fields{display:flex;flex-direction:column;gap:24px;max-width:340px}
.field{position:relative}
.field input{
  width:100%;background:none;border:none;border-bottom:1px solid rgba(255,255,255,0.25);

}
.field input:focus{border-bottom-color:rgba(255,255,255,0.8)}
.field input::placeholder{color:rgba(255,255,255,0.25);font-weight:300;letter-spacing:1px}

.btn{
  margin-top:36px;
  width:160px;height:48px;
  border-radius:24px;border:none;
  background:#fff;color:#000;
  font-family:'Roboto',sans-serif;font-weight:700;
  font-size:14px;letter-spacing:2px;
  cursor:pointer;
  transition:transform 0.2s,box-shadow 0.3s;
}
.btn:hover{transform:scale(1.04);box-shadow:0 0 20px rgba(255,255,255,0.15)}
.btn:active{transform:scale(0.97)}

.toast{
  position:fixed;bottom:40px;left:50%;transform:translateX(-50%) translateY(80px);
  background:rgba(255,255,255,0.95);color:#000;
  font-family:'Roboto',sans-serif;font-weight:700;font-size:14px;
  letter-spacing:1px;padding:14px 36px;border-radius:24px;
  z-index:50;opacity:0;transition:all 0.4s ease;pointer-events:none;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.error{background:rgba(255,60,60,0.9);color:#fff}

#mobile-overlay{
  display:none;position:fixed;top:0;left:0;width:100%;height:100%;
  z-index:100;background:#000;
  flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:40px;
}
#mobile-overlay .mo-title{
  font-weight:900;font-size:24px;margin-bottom:16px;
  letter-spacing:-0.3px;
}
#mobile-overlay .mo-text{
  font-weight:300;font-size:14px;
  color:rgba(255,255,255,0.4);line-height:1.6;
  max-width:320px;
}
#mobile-overlay .mo-icon{
  width:48px;height:48px;margin-bottom:30px;
  border:2px solid rgba(255,255,255,0.2);border-radius:12px;
  display:flex;align-items:center;justify-content:center;
}
#mobile-overlay .mo-icon svg{
  width:24px;height:24px;stroke:rgba(255,255,255,0.4);
  fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;
}
</style>

<div class="panel" id="panel">

    <div class="field">
      <input type="text" placeholder="Логин" autocomplete="off" id="login-input">

</div>

<div class="toast" id="toast"></div>

<canvas id="particles"></canvas>
<canvas id="pc"></canvas>

<script>
(function(){
  var c=document.getElementById('particles');
  var ctx=c.getContext('2d');
  var W,H;
  function resize(){W=c.width=innerWidth;H=c.height=innerHeight}
  resize();
  window.addEventListener('resize',resize);
  var COUNT=120;
  var pts=[];
  for(var i=0;i<COUNT;i++){
    pts.push({
      x:Math.random()*innerWidth,
      y:Math.random()*innerHeight,
      r:Math.random()*2+0.5,
      vx:(Math.random()-0.5)*0.3,
      vy:(Math.random()-0.5)*0.3,
      a:Math.random()*0.5+0.15,
      ph:Math.random()*Math.PI*2
    });
  }
  function draw(){
    ctx.clearRect(0,0,W,H);
    var t=Date.now()*0.001;
    for(var i=0;i<pts.length;i++){
      var p=pts[i];
      p.x+=p.vx;p.y+=p.vy;
      if(p.x<0)p.x=W;if(p.x>W)p.x=0;
      if(p.y<0)p.y=H;if(p.y>H)p.y=0;
      var al=p.a*(0.5+0.5*Math.sin(t+p.ph));
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle='rgba(255,255,255,'+al+')';
      ctx.fill();
    }
    requestAnimationFrame(draw);
  }
  draw();
})();
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from './lib/GLTFLoader.js';

const isMobileUA = /Android|iPhone|iPad|iPod|webOS|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
if(isMobileUA && innerWidth < 768){
  document.getElementById('pc').style.display='none';
  throw new Error('mobile');
}

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);

const camera = new THREE.PerspectiveCamera(45, innerWidth/innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({canvas:document.getElementById('pc'), antialias:true});
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(devicePixelRatio);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;

scene.add(new THREE.AmbientLight(0xffffff, 0.6));
const key = new THREE.DirectionalLight(0xffffff, 4);
key.position.set(5, 10, 7);
scene.add(key);
const fill = new THREE.DirectionalLight(0xffffff, 2);
fill.position.set(-5, 3, -5);
scene.add(fill);
const rim = new THREE.DirectionalLight(0xffffff, 2.5);
rim.position.set(0, -2, -5);
scene.add(rim);
const topL = new THREE.PointLight(0xffffff, 3, 50);
topL.position.set(0, 10, 0);
scene.add(topL);
const frontL = new THREE.PointLight(0xffffff, 2, 50);
frontL.position.set(0, 0, 10);
scene.add(frontL);

let model = null;
const loader = new GLTFLoader();
loader.load('anonymous_small.glb', (gltf) => {
  model = gltf.scene;
  const box = new THREE.Box3().setFromObject(model);
  const center = box.getCenter(new THREE.Vector3());
  const size = box.getSize(new THREE.Vector3());
  const maxDim = Math.max(size.x, size.y, size.z);
  const fitDist = maxDim * 3.0;
  model.position.sub(center);
  model.position.x += fitDist * 0.09;
  camera.position.set(0, 0, fitDist);
  scene.add(model);
});

function animate() {
  requestAnimationFrame(animate);
  if (model) model.rotation.y += 0.015;
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
